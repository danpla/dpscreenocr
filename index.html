<!DOCTYPE html>
<!-- This document was automatically generated. -->
<html>
<head>
<title>dpScreenOCR</title>
<meta charset="utf-8">
<script>
  const langs = ["en", "hr", "ru", "uk"];
  const storageLangKey = "lang";

  const userLangFixups = {
    // Some browsers use no longer recommended zh-CN and zh-TW codes
    // for Simplified and Traditional Chinese. See:
    // https://www.w3.org/International/geo/html-tech/tech-lang.html
    "zh-CN": "zh-Hans",
    "zh-TW": "zh-Hant"
  };

  function detectPageLang() {
    const userLangs = navigator.languages || [navigator.language];

    for (let userLang of userLangs) {
      userLang = userLangFixups[userLang] || userLang;

      while (true) {
        for (const lang of langs)
          if (lang.startsWith(userLang))
            return lang;

        const hyphenIndex = userLang.lastIndexOf('-');
        if (hyphenIndex == -1)
          break;

        userLang = userLang.substring(0, hyphenIndex);
      }
    }

    return null;
  }

  let pageLang;

  // The language can be saved in localStorage not only by this
  // script, but also by clicking on a language menu item.
  //
  // Access to localStorage may be disabled by the user, so guard it
  // with try-catch.
  try {
    pageLang = localStorage.getItem(storageLangKey);
  } catch {
  }

  // Make sure the cached value is still valid because the language
  // can be removed.
  if (pageLang && !langs.includes(pageLang))
    pageLang = null;

  if (!pageLang) {
    pageLang = detectPageLang() || "en";

    try {
      localStorage.setItem(storageLangKey, pageLang);
    } catch {
    }
  }

  window.location.replace(pageLang + "/");
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=en/">
</noscript>
</head>
<body>
  <!--
  A fallback for weird browsers that don't support <meta> redirect.
  -->
  <a href="en/">English</a>
</body>
</html>
